name: ai_study_helper
description: A simple and fast Flutter app for solving questions and practicing MCQs.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^5.6.1
  firebase_core: ^3.10.0
  flutter_image_compress: ^2.4.0
  flutter_tts: ^4.2.2
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.2
  image: ^4.1.7
  image_picker: ^1.1.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
